services:
  mongodb:
    image: mongo:8.0
    container_name: airmind_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - airmind_net

  backend:
    build:
      context: ./backend
    container_name: airmind_backend
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=airmind
      - JWT_SECRET=super_secret_airmind_development_key_change_in_production
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=60
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=7
      - GEMINI_API_KEY=your_gemini_api_key_here
    depends_on:
      - mongodb
    networks:
      - airmind_net

  frontend:
    build:
      context: .
    container_name: airmind_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - airmind_net

volumes:
  mongo_data:

networks:
  airmind_net:
    driver: bridge
